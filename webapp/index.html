<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Runner v2</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="hud-card topbar">
        <div>
          <div class="eyebrow">Telegram Mini App</div>
          <h1>Runner v2</h1>
        </div>
        <div class="score-boxes">
          <div class="score-chip">
            <span>Счёт</span>
            <b id="score">0</b>
          </div>
          <div class="score-chip">
            <span>Рекорд</span>
            <b id="bestInline">0</b>
          </div>
        </div>
      </header>

      <section class="game-wrap hud-card">
        <div class="mini-meta">
          <span>Игрок: <b id="playerName">—</b></span>
          <span>Статус: <b id="status">Готов</b></span>
        </div>

        <div class="canvas-wrap">
          <canvas id="game" width="420" height="640"></canvas>
          <div class="overlay visible" id="startOverlay">
            <div class="overlay-card">
              <h2>Нажми, чтобы стартовать</h2>
              <p>Тап по экрану, пробел или кнопка снизу — прыжок.</p>
            </div>
          </div>
          <div class="overlay" id="gameOverOverlay">
            <div class="overlay-card stats-card">
              <div class="badge" id="recordBadge">Результат сохранён</div>
              <h2>Игра окончена</h2>
              <div class="stats-grid">
                <div><span>Текущий</span><b id="currentScore">0</b></div>
                <div><span>Лучший</span><b id="bestScore">0</b></div>
                <div><span>Место</span><b id="placeValue">-</b></div>
                <div><span>Секунд</span><b id="timeValue">0.0</b></div>
              </div>
              <div class="leaderboard-block">
                <h3>Топ-10 игроков</h3>
                <ol id="leaderboard"></ol>
              </div>
              <p class="hint">Нажми «Играть снова» или просто тапни по экрану.</p>
            </div>
          </div>
        </div>
      </section>

      <footer class="controls hud-card">
        <button id="jumpBtn" class="primary">Прыжок</button>
        <button id="restartBtn">Играть снова</button>
      </footer>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
