<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pick Me Runner v6</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="hud-card topbar">
      <div class="brandbox">
        <img src="./assets/mascot-selfie.png" alt="Pick Me Mascot" class="brand-avatar" />
        <div class="brand-copy">
          <div class="eyebrow">PICK ME • TELEGRAM MINI APP</div>
          <h1>Runner</h1>
        </div>
      </div>
      <div class="score-boxes">
        <div class="score-chip"><span>Счёт</span><b id="score">0</b></div>
        <div class="score-chip"><span>Рекорд</span><b id="bestInline">0</b></div>
        <div class="score-chip"><span>Монеты</span><b id="coinsInline">0</b></div>
      </div>
    </header>

    <section class="game-wrap hud-card">
      <div class="mini-meta">
        <span>Игрок: <b id="playerName">—</b></span>
        <span>Статус: <b id="status">Готов</b></span>
      </div>

      <div class="canvas-wrap">
        <canvas id="game" width="420" height="640"></canvas>

        <div class="overlay visible" id="startOverlay">
          <div class="overlay-card start-card">
            <img src="./assets/pickme-cover.png" alt="Pick Me Cover" class="cover-art" />
            <div class="overlay-mascot">
              <img src="./assets/mascot-selfie.png" alt="Mascot" />
            </div>
            <h2>Нажми, чтобы стартовать</h2>
            <p>Тап по экрану, пробел или кнопка снизу — прыжок. Лови монетки и избегай препятствий.</p>
          </div>
        </div>

        <div class="overlay" id="gameOverOverlay">
          <div class="overlay-card stats-card">
            <img src="./assets/pickme-cover.png" alt="Pick Me Cover" class="cover-art small" />
            <div class="badge" id="recordBadge">Результат сохранён</div>
            <h2>Игра окончена</h2>
            <div class="stats-grid">
              <div><span>Текущий</span><b id="currentScore">0</b></div>
              <div><span>Лучший</span><b id="bestScore">0</b></div>
              <div><span>Монеты</span><b id="coinsValue">0</b></div>
              <div><span>Время</span><b id="timeValue">0.0</b></div>
            </div>
            <div class="leaderboard-wrap">
              <h3>Топ игроков</h3>
              <div id="leaderboard" class="leaderboard">Загрузка...</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="footer-actions hud-card">
      <button id="jumpBtn" class="btn btn-primary">Прыжок</button>
      <button id="restartBtn" class="btn btn-secondary">Играть снова</button>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
